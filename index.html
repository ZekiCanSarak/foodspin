<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodSpin — World Cuisine Spinner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
    <div class="logo">🍽 FoodSpin</div>
    <p class="tagline">Spin the reels · Discover the world on a plate</p>
</header>

<div class="machine" id="machine">
    <div class="lights-bar" id="lightsBar"></div>
    <div class="machine-body">
        <div class="reels-row" id="reelsRow"></div>
        <div class="spin-wrap">
            <button class="spin-btn" id="spinBtn">SPIN</button>
            <p class="status-text" id="statusText">Press SPIN to discover a world cuisine!</p>
        </div>
    </div>
</div>

<div class="result-card" id="resultCard"></div>

<script src="script.js"></script>
</body>
</html>
